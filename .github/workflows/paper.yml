name: paper-trade

on:
  schedule:
    - cron: "2 * * * *"      # óránként újraindul; a loop tölti ki az órát (~folyamatos)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Függőségek
        run: pip install -r requirements.txt
      - name: Git azonosító
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
      - name: Folyamatos papír-foglaló (loop, ~90 mp-enként scan)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_watch.py
