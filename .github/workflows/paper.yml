name: paper-trade

on:
  schedule:
    - cron: "7 * * * *"      # óránként (privát repo Actions-keret alatt marad)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Függőségek
        run: pip install -r requirements.txt
      - name: Papír-foglaló futtatása
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_cron.py
      - name: Ledger visszamentése
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
          git add paper_data.json
          if git diff --cached --quiet; then
            echo "nincs valtozas a ledgerben"
          else
            git commit -m "paper: ledger frissites [skip ci]"
            git push
          fi
