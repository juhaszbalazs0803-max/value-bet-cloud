name: paper-trade

on:
  schedule:
    - cron: "2 * * * *"      # óránként újraindul; a loop tölti ki az órát (~folyamatos)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Függőségek
        run: pip install -r requirements.txt
      - name: Git azonosító
        run: |
          git config user.name "paper-bot"
          git config user.email "paper-bot@users.noreply.github.com"
      - name: Folyamatos papír-foglaló (loop, ~90 mp-enként scan)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python paper_watch.py
      # Ha maga a python-futás hal el (import-hiba, kódtörés, crash), a fenti
      # loopon belüli riasztó nem tud szólni -> innen megy a Telegram-üzenet.
      - name: Crash-riasztás Telegramra
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🔴 Value-bet: a felhős futás HIBÁVAL állt le (kódtörés/crash). Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /dev/null || true
